<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VNEM Browser Interaction Fixture</title>
    <style>
      :root { color-scheme: light; font-family: Arial, sans-serif; color: #14213d; background: #f4f7fb; }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; }
      main { width: min(720px, calc(100% - 32px)); margin: 32px auto; }
      h1 { margin: 0 0 8px; font-size: 30px; }
      .panel { margin-top: 20px; padding: 20px; border: 1px solid #b7c4d6; border-radius: 8px; background: white; }
      .state { min-height: 52px; padding: 14px; border-left: 5px solid #2a6f97; background: #eaf4fb; }
      .fields { display: grid; grid-template-columns: 1fr 180px auto; gap: 12px; align-items: end; }
      label { display: grid; gap: 6px; font-weight: 700; }
      input, select, button { min-height: 42px; border: 1px solid #718096; border-radius: 6px; padding: 8px 10px; font: inherit; }
      button { border-color: #205493; color: white; background: #205493; cursor: pointer; }
      #result { margin-bottom: 0; font-weight: 700; }
      #result.saved { color: #146c43; }
      @media (max-width: 620px) {
        main { margin-top: 18px; }
        h1 { font-size: 25px; }
        .fields { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="heading">Browser interaction lab</h1>
      <p id="details" hidden>Details ready</p>
      <section class="panel" aria-labelledby="state-heading">
        <h2 id="state-heading">Application state</h2>
        <p id="state" class="state" role="status">Ready</p>
      </section>
      <section class="panel" aria-labelledby="editor-heading">
        <h2 id="editor-heading">Safe test editor</h2>
        <div class="fields">
          <label>Task title<input id="task-title" type="text" autocomplete="off" value=""></label>
          <label>Priority<select id="priority"><option value="normal">Normal</option><option value="high">High</option></select></label>
          <button id="save" type="button">Save task</button>
        </div>
        <p id="result" aria-live="polite">Nothing saved yet</p>
      </section>
      <p><a id="restricted-link" href="/account">Account details</a></p>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const state = params.get("state") || "success";
      const messages = {
        loading: "Loading data",
        empty: "No records",
        error: "Could not load",
        success: "Ready for input",
        challenge: "Human verification CAPTCHA",
        protected: "Protected form"
      };
      document.querySelector("#state").textContent = messages[state] || messages.success;
      if (state === "protected") {
        const field = document.createElement("input");
        field.type = "password";
        field.setAttribute("aria-label", "Protected value");
        document.querySelector("#state").after(field);
      }
      if (location.pathname === "/details") {
        document.querySelector("#heading").textContent = "Fixture details";
        document.querySelector("#details").hidden = false;
      }
      document.querySelector("#save").addEventListener("click", () => {
        const title = document.querySelector("#task-title").value.trim();
        const priority = document.querySelector("#priority").value;
        const result = document.querySelector("#result");
        result.textContent = title ? `Saved ${title} with ${priority} priority` : "Task title is required";
        result.classList.toggle("saved", Boolean(title));
      });
    </script>
  </body>
</html>
