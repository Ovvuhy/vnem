name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare-pages.yml"
      - "landing/**"
      - "public/install.tgz"
      - "public/install/**"
      - "registry/**"
      - "schemas/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run validate
      - run: npm run generate
      - run: npm run dashboard:build
      - run: cp public/install.tgz landing/i
      - run: cp public/install.tgz landing/install.tgz
      - run: npm run test:install-pack

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages functions build landing/functions --project-directory landing --outdir landing-functions --output-routes-path landing/_routes.json
      - run: cp landing-functions/index.js landing/_worker.js

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy landing --project-name=vnem --branch=main --commit-hash=${{ github.sha }}
