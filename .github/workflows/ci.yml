name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ci
      - run: npm run check:links
        continue-on-error: true
