schema_version: 1.0.0
slug: kaplay
name: KAPLAY
type: runtime
summary_llm: >-
  KAPLAY is a JavaScript and TypeScript 2D game library for fast browser-game prototyping,
  using component-style game objects, simple physics helpers, input, sprites, and web examples.
homepage_url: https://kaplayjs.com/
repo_url: https://github.com/kaplayjs/kaplay
package_urls:
  - https://www.npmjs.com/package/kaplay
licenses:
  - MIT
copyright_owner: KAPLAY Team
source_urls:
  - https://kaplayjs.com/
  - https://github.com/kaplayjs/kaplay
  - https://www.npmjs.com/package/kaplay
source_kind: official_docs
protocols: []
clients:
  - Browser
  - JavaScript
  - TypeScript
install:
  command: npm install kaplay
  notes: >-
    Use for quick 2D prototypes and playful examples; choose Phaser or Excalibur when larger game
    architecture is the main concern.
  config_example: null
permissions:
  - browser
  - canvas
  - audio
env_vars: []
tags:
  - runtime
  - game-library
  - browser-game
  - canvas
