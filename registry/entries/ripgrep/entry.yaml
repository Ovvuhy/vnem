schema_version: 1.0.0
slug: ripgrep
name: ripgrep
type: runtime
summary_llm: >-
  ripgrep is a mature Rust command-line search tool that recursively searches files for regex
  patterns while respecting gitignore rules, making it a strong default grep replacement for coding
  agents inspecting repositories.
homepage_url: https://github.com/BurntSushi/ripgrep
repo_url: https://github.com/BurntSushi/ripgrep
package_urls:
  - https://crates.io/crates/ripgrep
licenses:
  - MIT
  - Unlicense
copyright_owner: Andrew Gallant
source_urls:
  - https://github.com/BurntSushi/ripgrep
  - https://crates.io/crates/ripgrep
source_kind: github
protocols: []
clients:
  - CLI
install:
  command: cargo install ripgrep
  notes: >-
    Prefer rg for fast text search in codebases; use syntax-aware tools when structural matching or
    safe rewrites matter more than raw text search.
  config_example: null
permissions:
  - filesystem
env_vars: []
tags:
  - search
  - grep
  - regex
  - rust
  - coding-agents
use_cases:
  - Search codebases quickly
  - Respect gitignore while finding text patterns
  - Reduce token-heavy file exploration loops
best_for:
  - Coding agents that need fast lexical search before reading files
not_for:
  - Syntax-aware refactors or graph queries where AST or index-based tools are better.
alternatives:
  - ast-grep
  - ugrep
  - codebase-memory-mcp
supersedes: []
freshness: current
source_confidence: high
maintenance_signals:
  - Canonical GitHub repository and crates.io package were checked.
risk_flags:
  - reads-local-files
recommended_when:
  - Use as the default text-search primitive before opening files or proposing code changes.
trust_tier: promising
review_status: manual-reviewed
last_checked: '2026-05-27'
