schema_version: 1.0.0
slug: playcanvas-engine
name: PlayCanvas Engine
type: runtime
summary_llm: >-
  PlayCanvas Engine is an open-source browser 3D game engine built on WebGL2 and WebGPU, with
  APIs for rendering, assets, input, animation, audio, physics integration, and WebXR.
homepage_url: https://playcanvas.com
repo_url: https://github.com/playcanvas/engine
package_urls:
  - https://www.npmjs.com/package/playcanvas
licenses:
  - MIT
copyright_owner: PlayCanvas Ltd.
source_urls:
  - https://playcanvas.com
  - https://developer.playcanvas.com/user-manual/engine/
  - https://github.com/playcanvas/engine
  - https://www.npmjs.com/package/playcanvas
source_kind: official_docs
protocols: []
clients:
  - Browser
  - JavaScript
  - TypeScript
install:
  command: npm install playcanvas
  notes: >-
    Use for browser-first 3D games and visualizations; consider whether the editor workflow or pure
    engine API is desired.
  config_example: null
permissions:
  - browser
  - canvas
  - webgl
  - webgpu
  - webxr
  - audio
env_vars: []
tags:
  - runtime
  - game-engine
  - three-dimensional
  - webgl
  - webgpu
  - webxr
  - browser-game
  - typescript
use_cases:
